apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{SERVICE_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app: {{SERVICE_NAME}}
    env: {{ENVIRONMENT}}
spec:
  replicas: {{REPLICA_COUNT}}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{SERVICE_NAME}}
  template:
    metadata:
      labels:
        app: {{SERVICE_NAME}}
    spec:
      containers:
        - name: {{SERVICE_NAME}}
          image: {{IMAGE}}
          resources:
            requests:
              cpu: "{{CPU_REQUEST}}"
              memory: "{{MEMORY_REQUEST}}"
            limits:
              cpu: "{{CPU_LIMIT}}"
              memory: "{{MEMORY_LIMIT}}"
          ports:
            - containerPort: {{PORT}}
          livenessProbe:
            httpGet:
              path: {{HEALTH_CHECK_PATH}}
              port: {{PORT}}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{HEALTH_CHECK_PATH}}
              port: {{PORT}}
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: "{{ENVIRONMENT}}"
            - name: LOG_LEVEL
              value: "{{LOG_LEVEL}}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{SERVICE_NAME}}-svc
spec:
  selector:
    app: {{SERVICE_NAME}}
  ports:
    - port: 80
      targetPort: {{PORT}}
  type: ClusterIP
