# Postgres override — opt in to Postgres instead of the default SQLite.
#
# The default docker-compose.yml runs SQLite (identical to local dev). Apply
# this file ONLY when you need Postgres, e.g. for horizontal scaling:
#
#   cp .env.example .env   # fill AUTH_SECRET + POSTGRES_PASSWORD
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build
#
# Why you usually don't need this: the app is single-instance (in-memory
# broadcaster + rate limiter), so SQLite covers the same deployment shape at
# lower operational cost. See docs/design.md / the SQLite discussion.

services:
  backend:
    environment:
      # Override the SQLite default with the Postgres connection.
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-apo}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apo}
    deploy:
      resources:
        limits:
          memory: 256m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
