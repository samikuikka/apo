name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Lint + Typecheck (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build @apo/sdk
        # The SDK's exports map points external consumers at dist/. Internal dev
        # routes back to src/ via the `development` condition, but the build must
        # still succeed for any external/publish path. This catches build breakage
        # on every PR — previously no CI step built the SDK, which is how the
        # broken `build: tsc` script survived unnoticed.
        run: pnpm --filter @apo/sdk build
      - name: Verify SDK dist entry points
        # Belt-and-suspenders: assert each declared exports target actually
        # exists on disk after the build.
        run: |
          for f in index.js index.d.ts otel/index.js otel/index.d.ts \
                   agent-task/public.js agent-task/public.d.ts \
                   agent-task/integrations/ai-sdk.js agent-task/integrations/ai-sdk.d.ts \
                   agent-task/integrations/openai.js agent-task/integrations/openai.d.ts \
                   agent-task/integrations/anthropic.js agent-task/integrations/anthropic.d.ts; do
            test -f "packages/sdk/dist/$f" || { echo "MISSING dist/$f"; exit 1; }
          done
          echo "All SDK dist entry points present."
      - run: pnpm lint
      - run: pnpm typecheck

  backend:
    name: Typecheck + Test (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Typecheck
        working-directory: backend
        # basedpyright treats warnings as failures whenever GITHUB_ACTIONS is set,
        # even when --level error is requested. Keep the CI and local gates aligned.
        run: env -u GITHUB_ACTIONS uv run basedpyright --level error apo
      - name: Test
        working-directory: backend
        run: uv run pytest -x -q
