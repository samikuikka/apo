[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "apo-otel"
version = "0.1.0"
description = "OpenTelemetry setup for apo — standard OTLP export, no custom transport"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  "opentelemetry-api>=1.20",
  "opentelemetry-sdk>=1.20",
  "opentelemetry-exporter-otlp-proto-http>=1.20",
]

[project.optional-dependencies]
openai = [
  "opentelemetry-instrumentation-openai-v2>=2.0",
]
dev = [
  "pytest>=8.0",
  "basedpyright>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/apo_otel"]

[tool.basedpyright]
pythonVersion = "3.11"
venvPath = "../.."
venv = "backend/.venv"
extraPaths = ["src"]
reportMissingTypeStubs = false
reportExplicitAny = false
reportAny = false
