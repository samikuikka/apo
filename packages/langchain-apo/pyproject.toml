[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-apo"
version = "0.1.0"
description = "LangChain callback handler for apo observability"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.3.0",
]
dev = [
    "langchain-core>=0.3.0",
    "pytest>=8.0",
    "basedpyright>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/apo_langchain"]

[tool.basedpyright]
pythonVersion = "3.11"
reportMissingTypeStubs = false
reportExplicitAny = false
reportAny = false
